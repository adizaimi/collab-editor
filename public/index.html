<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CRDT Editor</title>
<style>
body { font-family:sans-serif; margin:40px; }
textarea { width:100%; height:400px; font-family:monospace; font-size:16px; }
</style>
</head>
<body>

<h2>CRDT Collaborative Editor</h2>
<textarea id="editor"></textarea>

<script>
const editor = document.getElementById("editor")
const params = new URLSearchParams(location.search)
const docId = params.get("doc")||"main"

const ws = new WebSocket(`ws://${location.host}?doc=${docId}`)
let lastText = ""

// Helper to apply server operations incrementally
function applyOp(msg){
  const textArr = editor.value.split("")
  const selStart = editor.selectionStart
  const selEnd = editor.selectionEnd

  if(msg.op.type==="insert"){
    // insert *at* offset
    textArr.splice(msg.op.offset,0,msg.op.value)
  } else if(msg.op.type==="delete"){
    // remove 1 char at offset
    if(msg.op.offset < textArr.length)
      textArr.splice(msg.op.offset,1)
  }

  editor.value = textArr.join("")
  // restore cursor
  editor.selectionStart = selStart
  editor.selectionEnd = selEnd
  lastText = editor.value
}

ws.onmessage = e=>{
  const msg = JSON.parse(e.data)
  if(msg.type==="init"){
    editor.value = msg.text
    lastText = editor.value
  }
  if(msg.type==="op"){
    applyOp(msg)
  }
}

// Listen for local typing
editor.addEventListener("input", e=>{
  const text = editor.value
  const diff = text.length - lastText.length
  const sel = editor.selectionStart

  if(diff>0){
    // insertion
    const inserted = text.slice(sel - diff, sel)
    for(let i=0;i<inserted.length;i++){
      // send offset of the *existing text before the inserted char*
      ws.send(JSON.stringify({type:"insert", value:inserted[i], offset: sel - diff + i}))
    }
  } else if(diff<0){
    // deletion
    for(let i=0;i<-diff;i++){
      ws.send(JSON.stringify({type:"delete", offset: sel}))
    }
  }

  lastText = editor.value
})
</script>

</body>
</html>
