<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CRDT Editor</title>
<style>
body { font-family:sans-serif; margin:40px; }
textarea { width:100%; height:400px; font-family:monospace; font-size:16px; }
</style>
</head>
<body>

<h2>CRDT Collaborative Editor</h2>
<textarea id="editor"></textarea>

<script>
const editor = document.getElementById("editor")
const params = new URLSearchParams(location.search)
const docId = params.get("doc") || "main"
const ws = new WebSocket(`ws://${location.host}?doc=${docId}`)

// Server-authoritative: clients never apply local input
let lastText = ""

// Apply server-broadcasted ops
function applyOp(op){
  const textArr = editor.value.split("")
  const selStart = editor.selectionStart
  const selEnd = editor.selectionEnd

  if(op.type === "insert"){
    textArr.splice(op.offset,0,op.value)
  } else if(op.type === "delete"){
    if(op.offset < textArr.length) textArr.splice(op.offset,1)
  }

  editor.value = textArr.join("")
  // preserve cursor
  editor.selectionStart = selStart
  editor.selectionEnd = selEnd
  lastText = editor.value
}

// Receive ops from server
ws.onmessage = e => {
  const msg = JSON.parse(e.data)
  if(msg.type === "init"){
    editor.value = msg.text
    lastText = editor.value
  }
  if(msg.type === "op"){
    applyOp(msg.op)
  }
}

// Capture typing intents but do NOT apply locally
editor.addEventListener("input", e => {
  const text = editor.value
  const diff = text.length - lastText.length
  const sel = editor.selectionStart

  if(diff > 0){
    const inserted = text.slice(sel - diff, sel)
    for(let i=0; i<inserted.length; i++){
      ws.send(JSON.stringify({
        type: "insert",
        value: inserted[i],
        offset: sel - diff + i
      }))
    }
  } else if(diff < 0){
    for(let i=0; i<-diff; i++){
      ws.send(JSON.stringify({
        type: "delete",
        offset: sel
      }))
    }
  }

  // Reset textarea to last server-authoritative text
  editor.value = lastText
})
</script>

</body>
</html>
