<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CRDT Editor</title>
<style>
body { font-family:sans-serif; margin:40px; }
textarea { width:100%; height:400px; font-family:monospace; font-size:16px; }
#toolbar { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
#status { padding:4px 10px; border-radius:4px; display:inline-block; font-size:13px; }
#status.connected { background:#d4edda; color:#155724; }
#status.disconnected { background:#f8d7da; color:#721c24; }
#status.connecting { background:#fff3cd; color:#856404; }
#users-bar { font-size:13px; color:#555; position:relative; }
#users-bar .label { font-weight:600; color:#333; }
#users-bar .you { color:#0366d6; font-weight:600; }
#users-overflow { color:#0366d6; cursor:pointer; text-decoration:underline dotted; position:relative; }
#users-popup { display:none; position:absolute; top:100%; left:0; margin-top:4px; background:#fff; border:1px solid #ddd; border-radius:6px; box-shadow:0 4px 12px rgba(0,0,0,.12); padding:8px 0; z-index:10; min-width:140px; max-height:240px; overflow-y:auto; }
#users-popup.visible { display:block; }
#users-popup .popup-item { padding:4px 14px; font-size:13px; white-space:nowrap; }
#users-popup .popup-item.you { color:#0366d6; font-weight:600; }
</style>
</head>
<body>

<h2>CRDT Collaborative Editor</h2>
<div id="toolbar">
  <div id="status" class="connecting">Connecting...</div>
  <div id="users-bar"><span class="label">Users:</span> <span id="users-list"></span></div>
</div>
<textarea id="editor"></textarea>

<script>
const editor = document.getElementById("editor")
const statusEl = document.getElementById("status")
const usersListEl = document.getElementById("users-list")
const params = new URLSearchParams(location.search)
const docId = params.get("doc") || "main"
const clientId = Math.random().toString(36).substring(7)

let myUserId = null
let currentUsers = []
const INLINE_MAX = 3

function renderUsers() {
  usersListEl.innerHTML = ""
  if (currentUsers.length === 0) return

  if (currentUsers.length <= INLINE_MAX) {
    usersListEl.innerHTML = currentUsers.map(u => {
      const isYou = u === myUserId
      return `<span class="${isYou ? 'you' : ''}">${u}${isYou ? ' (you)' : ''}</span>`
    }).join(", ")
  } else {
    // Show first 2 inline + "+N more" with popup
    const shown = currentUsers.slice(0, 2)
    const rest = currentUsers.slice(2)
    const inlineParts = shown.map(u => {
      const isYou = u === myUserId
      return `<span class="${isYou ? 'you' : ''}">${u}${isYou ? ' (you)' : ''}</span>`
    }).join(", ")

    const popupItems = currentUsers.map(u => {
      const isYou = u === myUserId
      return `<div class="popup-item ${isYou ? 'you' : ''}">${u}${isYou ? ' (you)' : ''}</div>`
    }).join("")

    usersListEl.innerHTML = `${inlineParts}, <span id="users-overflow">+${rest.length} more<div id="users-popup">${popupItems}</div></span>`

    const overflow = document.getElementById("users-overflow")
    const popup = document.getElementById("users-popup")
    overflow.addEventListener("mouseenter", () => popup.classList.add("visible"))
    overflow.addEventListener("mouseleave", () => popup.classList.remove("visible"))
  }
}

let ws = null
let serverText = "" // Server-authoritative state
let applying = false // Flag to prevent input handler during apply
let lastSelStart = 0
let lastSelEnd = 0
let lastInputType = ""

// Reconnection state
let reconnectAttempts = 0
const RECONNECT_BASE_DELAY = 1000  // 1 second
const RECONNECT_MAX_DELAY = 30000  // 30 seconds
let reconnectTimer = null

// Heartbeat: detect if server stops responding
const CLIENT_HEARTBEAT_INTERVAL = 5000  // Check every 5s
const SERVER_TIMEOUT = 20000            // Consider dead after 20s with no message
let lastServerMessage = 0
let heartbeatTimer = null

function setStatus(state, text) {
  statusEl.className = state
  statusEl.textContent = text
}

function connect() {
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
    return
  }

  setStatus("connecting", reconnectAttempts > 0 ? `Reconnecting (attempt ${reconnectAttempts})...` : "Connecting...")

  ws = new WebSocket(`ws://${location.host}?doc=${docId}`)

  ws.onopen = () => {
    reconnectAttempts = 0
    lastServerMessage = Date.now()
    setStatus("connected", "Connected")
    startHeartbeatCheck()
  }

  ws.onmessage = e => {
    lastServerMessage = Date.now()
    const msg = JSON.parse(e.data)
    if(msg.type === "init"){
      serverText = msg.text
      applying = true
      editor.value = serverText
      applying = false
      if (msg.userId) myUserId = msg.userId
      if (msg.users) { currentUsers = msg.users; renderUsers() }
    }
    if(msg.type === "users"){
      currentUsers = msg.users
      renderUsers()
    }
    if(msg.type === "op"){
      applyOp(msg.op)
    }
  }

  ws.onclose = () => {
    stopHeartbeatCheck()
    setStatus("disconnected", "Disconnected")
    scheduleReconnect()
  }

  ws.onerror = () => {
    // onclose will fire after onerror, so reconnect is handled there
  }
}

function scheduleReconnect() {
  if (reconnectTimer) return
  reconnectAttempts++
  const delay = Math.min(RECONNECT_BASE_DELAY * Math.pow(2, reconnectAttempts - 1), RECONNECT_MAX_DELAY)
  setStatus("disconnected", `Disconnected. Reconnecting in ${Math.round(delay / 1000)}s...`)
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null
    connect()
  }, delay)
}

function startHeartbeatCheck() {
  stopHeartbeatCheck()
  heartbeatTimer = setInterval(() => {
    if (Date.now() - lastServerMessage > SERVER_TIMEOUT) {
      console.log("[Heartbeat] Server unresponsive, reconnecting...")
      stopHeartbeatCheck()
      if (ws) {
        ws.close()
      }
    }
  }, CLIENT_HEARTBEAT_INTERVAL)
}

function stopHeartbeatCheck() {
  if (heartbeatTimer) {
    clearInterval(heartbeatTimer)
    heartbeatTimer = null
  }
}

function sendOp(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data))
  }
}

// Track selection and input type before input
editor.addEventListener("beforeinput", (e) => {
  if(!applying){
    lastSelStart = editor.selectionStart
    lastSelEnd = editor.selectionEnd
    lastInputType = e.inputType || ""
  }
})

// Apply server-broadcasted ops
function applyOp(op){
  applying = true
  const textArr = serverText.split("")
  let cursorOffset = 0

  if(op.type === "insert"){
    textArr.splice(op.offset, 0, op.value)
    if(op.offset <= lastSelStart) cursorOffset = 1
  } else if(op.type === "delete"){
    if(op.offset < textArr.length) {
      textArr.splice(op.offset, 1)
      if(op.offset < lastSelStart) cursorOffset = -1
    }
  }

  serverText = textArr.join("")
  editor.value = serverText

  editor.selectionStart = Math.max(0, lastSelStart + cursorOffset)
  editor.selectionEnd = Math.max(0, lastSelEnd + cursorOffset)
  lastSelStart = editor.selectionStart
  lastSelEnd = editor.selectionEnd

  applying = false
}

// Capture typing and send operations to server
editor.addEventListener("input", e => {
  if(applying) return

  const text = editor.value
  const selStart = lastSelStart
  const selEnd = lastSelEnd
  const cursorPos = editor.selectionStart

  // Handle selection replacement: delete selected text first
  if(selEnd > selStart){
    for(let i = selStart; i < selEnd; i++){
      sendOp({
        type: "delete",
        offset: selStart,
        char: serverText[selStart],
        clientId
      })
    }
  }

  // Determine what was inserted
  const oldLen = serverText.length - (selEnd - selStart)
  const newLen = text.length
  const inserted = newLen - oldLen

  if(inserted > 0){
    const insertedText = text.slice(selStart, selStart + inserted)
    for(let i = 0; i < insertedText.length; i++){
      sendOp({
        type: "insert",
        value: insertedText[i],
        offset: selStart + i,
        clientId
      })
    }
  } else if(inserted < 0){
    const deleteCount = -inserted
    for(let i = 0; i < deleteCount; i++){
      let offset
      if(lastInputType === "deleteContentForward"){
        offset = cursorPos
      } else {
        offset = cursorPos < selStart ? cursorPos : selStart - 1
      }
      sendOp({
        type: "delete",
        offset: Math.max(0, offset),
        char: serverText[Math.max(0, offset)],
        clientId
      })
    }
  }

  // Revert to server state (wait for echo)
  applying = true
  editor.value = serverText
  editor.selectionStart = selStart
  editor.selectionEnd = selStart
  lastSelStart = selStart
  lastSelEnd = selStart
  applying = false
})

// Start initial connection
connect()
</script>

</body>
</html>
