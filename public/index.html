<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CRDT Editor</title>
<style>
html, body { height:100%; margin:0; }
body { font-family:sans-serif; padding:20px 40px; box-sizing:border-box; display:flex; flex-direction:column; }

#toolbar { display:flex; align-items:center; gap:12px; margin-bottom:8px; flex-wrap:wrap; }
#status { padding:4px 10px; border-radius:4px; display:inline-block; font-size:13px; }
#status.connected { background:#d4edda; color:#155724; }
#status.disconnected { background:#f8d7da; color:#721c24; }
#status.connecting { background:#fff3cd; color:#856404; }

#users-bar { font-size:13px; color:#555; position:relative; display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
#users-bar .label { font-weight:600; color:#333; margin-right:2px; }
.user-badge {
  display:inline-block; padding:2px 9px; border-radius:10px;
  color:#fff; font-size:12px; font-weight:500; cursor:pointer;
  white-space:nowrap; transition:opacity .15s; line-height:1.5;
}
.user-badge:hover { opacity:.8; }
.user-badge.you { box-shadow:inset 0 0 0 2px rgba(255,255,255,.5); }

#users-overflow { color:#0366d6; cursor:pointer; text-decoration:underline dotted; position:relative; font-size:12px; }
#users-popup {
  display:none; position:absolute; top:100%; left:0; margin-top:4px;
  background:#fff; border:1px solid #ddd; border-radius:6px;
  box-shadow:0 4px 12px rgba(0,0,0,.12); padding:6px 0;
  z-index:20; min-width:140px; max-height:240px; overflow-y:auto;
}
#users-popup.visible { display:block; }
#users-popup .popup-item { padding:3px 10px; cursor:pointer; }
#users-popup .popup-item:hover { background:#f5f5f5; }

#editor-container { position:relative; width:100%; flex:1; min-height:200px; }

#backdrop {
  position:absolute; top:0; left:0; right:0; bottom:0;
  overflow:hidden; pointer-events:none; z-index:0;
}

#highlights {
  font-family:monospace; font-size:16px; line-height:1.4;
  padding:4px; border:1px solid transparent;
  white-space:pre-wrap; word-wrap:break-word; overflow-wrap:break-word;
  color:transparent; box-sizing:border-box;
  width:100%; margin:0;
}
#highlights mark {
  color:transparent; border-radius:3px;
}

#editor {
  width:100%; height:100%; font-family:monospace; font-size:16px; line-height:1.4;
  padding:4px; border:1px solid #ccc; background:transparent;
  position:relative; z-index:1; resize:none;
  box-sizing:border-box; margin:0;
}

#location-bar {
  text-align:right; font-size:12px; color:#888;
  margin-top:4px; font-family:monospace;
}
</style>
</head>
<body>

<h2>CRDT Collaborative Editor</h2>
<div id="toolbar">
  <div id="status" class="connecting">Connecting...</div>
  <div id="users-bar"><span class="label">Users:</span> <span id="users-list"></span></div>
</div>
<div id="editor-container">
  <div id="backdrop"><div id="highlights"></div></div>
  <textarea id="editor"></textarea>
</div>
<div id="location-bar">Location: <span id="location">Ln 1, Col 1</span></div>

<script>
const editor = document.getElementById("editor")
const statusEl = document.getElementById("status")
const usersListEl = document.getElementById("users-list")
const highlightsEl = document.getElementById("highlights")
const backdropEl = document.getElementById("backdrop")
const locationEl = document.getElementById("location")
const params = new URLSearchParams(location.search)
const docId = params.get("doc") || "main"
const clientId = Math.random().toString(36).substring(7)

let ws = null
let serverText = ""
let applying = false
let lastSelStart = 0
let lastSelEnd = 0
let lastInputType = ""

let myUserId = null
let myColor = null
let currentUsers = []    // [{id, color, cursor}]
let remoteCursors = {}   // userId -> {offset, selEnd, color}
const INLINE_MAX = 3

// Reconnection state
let reconnectAttempts = 0
const RECONNECT_BASE_DELAY = 1000
const RECONNECT_MAX_DELAY = 30000
let reconnectTimer = null

// --- Helpers ---

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
}

function setStatus(state, text) {
  statusEl.className = state
  statusEl.textContent = text
}

function applySelectionColor(color) {
  let el = document.getElementById("selection-style")
  if (!el) { el = document.createElement("style"); el.id = "selection-style"; document.head.appendChild(el) }
  el.textContent = "#editor::selection { background:" + color + "50; }"
}

function sendOp(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data))
  }
}

// --- User presence rendering ---

function renderUsers() {
  usersListEl.innerHTML = ""
  if (currentUsers.length === 0) return

  // Always list self first
  const sorted = currentUsers.slice().sort((a, b) => {
    if (a.id === myUserId) return -1
    if (b.id === myUserId) return 1
    return 0
  })

  const makeBadge = (u) => {
    const isYou = u.id === myUserId
    const label = isYou ? u.id + " (you)" : u.id
    const youClass = isYou ? " you" : ""
    return '<span class="user-badge' + youClass + '" style="background:' + u.color +
      '" data-userid="' + u.id + '" title="Click to jump to cursor">' + label + '</span>'
  }

  if (sorted.length <= INLINE_MAX) {
    usersListEl.innerHTML = sorted.map(makeBadge).join(" ")
  } else {
    const shown = sorted.slice(0, 2)
    const rest = sorted.slice(2)
    const popupItems = sorted.map(u =>
      '<div class="popup-item">' + makeBadge(u) + '</div>'
    ).join("")

    usersListEl.innerHTML = shown.map(makeBadge).join(" ") +
      ' <span id="users-overflow">+' + rest.length + ' more' +
      '<div id="users-popup">' + popupItems + '</div></span>'

    const overflow = document.getElementById("users-overflow")
    const popup = document.getElementById("users-popup")
    overflow.addEventListener("mouseenter", () => popup.classList.add("visible"))
    overflow.addEventListener("mouseleave", () => popup.classList.remove("visible"))
  }
}

// Event delegation for badge clicks
usersListEl.addEventListener("click", (e) => {
  const badge = e.target.closest(".user-badge")
  if (!badge) return
  const userId = badge.dataset.userid
  if (!userId || userId === myUserId) return
  const cursor = remoteCursors[userId]
  if (!cursor) return
  editor.focus()
  editor.selectionStart = cursor.offset
  editor.selectionEnd = (cursor.selEnd != null) ? cursor.selEnd : cursor.offset
})

// --- Selection highlight overlay ---

function renderHighlights() {
  const len = serverText.length
  const sels = Object.values(remoteCursors)
    .filter(c => c.offset !== c.selEnd)
    .map(c => ({
      start: Math.max(0, Math.min(len, Math.min(c.offset, c.selEnd))),
      end:   Math.max(0, Math.min(len, Math.max(c.offset, c.selEnd))),
      color: c.color
    }))
    .filter(s => s.start < s.end)
    .sort((a, b) => a.start - b.start)

  if (sels.length === 0) {
    highlightsEl.textContent = serverText + '\n'
    return
  }

  let html = ''
  let pos = 0
  for (const sel of sels) {
    const start = Math.max(sel.start, pos)
    const end = sel.end
    if (start >= end) continue
    if (start > pos) html += escapeHtml(serverText.slice(pos, start))
    html += '<mark style="background:' + sel.color + '40">' +
            escapeHtml(serverText.slice(start, end)) + '</mark>'
    pos = end
  }
  if (pos < serverText.length) html += escapeHtml(serverText.slice(pos))
  html += '\n'
  highlightsEl.innerHTML = html
}

// --- Location bar ---

function updateLocation() {
  const offset = Math.min(editor.selectionStart, serverText.length)
  const before = serverText.slice(0, offset)
  const lines = before.split('\n')
  const line = lines.length
  const col = lines[lines.length - 1].length + 1
  const selLen = Math.abs(editor.selectionEnd - editor.selectionStart)
  locationEl.textContent = 'Ln ' + line + ', Col ' + col +
    (selLen > 0 ? ' (' + selLen + ' selected)' : '')
}

// --- Scroll sync ---

editor.addEventListener('scroll', () => {
  backdropEl.scrollTop = editor.scrollTop
  backdropEl.scrollLeft = editor.scrollLeft
})

// --- Cursor broadcasting (debounced) ---

let cursorTimer = null
function sendCursorUpdate() {
  clearTimeout(cursorTimer)
  cursorTimer = setTimeout(() => {
    sendOp({
      type: "cursor",
      offset: editor.selectionStart,
      selEnd: editor.selectionEnd,
      clientId
    })
  }, 50)
}

document.addEventListener('selectionchange', () => {
  if (document.activeElement !== editor) return
  updateLocation()
  sendCursorUpdate()
})

// --- Connection ---

function connect() {
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return

  setStatus("connecting", reconnectAttempts > 0
    ? "Reconnecting (attempt " + reconnectAttempts + ")..." : "Connecting...")

  ws = new WebSocket("ws://" + location.host + "?doc=" + docId)

  ws.onopen = () => {
    reconnectAttempts = 0
    setStatus("connected", "Connected")
  }

  ws.onmessage = e => {
    const msg = JSON.parse(e.data)

    if (msg.type === "init") {
      serverText = msg.text
      applying = true
      editor.value = serverText
      applying = false
      if (msg.userId) myUserId = msg.userId
      if (msg.color) { myColor = msg.color; applySelectionColor(myColor) }
      if (msg.users) {
        currentUsers = msg.users
        syncRemoteCursors()
        renderUsers()
      }
      renderHighlights()
      updateLocation()
    }

    if (msg.type === "users") {
      currentUsers = msg.users
      syncRemoteCursors()
      renderUsers()
      renderHighlights()
    }

    if (msg.type === "cursor") {
      remoteCursors[msg.userId] = {
        offset: msg.offset,
        selEnd: msg.selEnd,
        color: msg.color
      }
      renderHighlights()
    }

    if (msg.type === "op") {
      applyOp(msg.op)
      renderHighlights()
    }
  }

  ws.onclose = () => {
    setStatus("disconnected", "Disconnected")
    scheduleReconnect()
  }

  ws.onerror = () => {}
}

// Sync remoteCursors from the full users list (add new, remove departed)
function syncRemoteCursors() {
  const activeIds = new Set()
  for (const u of currentUsers) {
    activeIds.add(u.id)
    if (u.id !== myUserId && u.cursor) {
      remoteCursors[u.id] = { offset: u.cursor.offset, selEnd: u.cursor.selEnd, color: u.color }
    }
  }
  for (const id of Object.keys(remoteCursors)) {
    if (!activeIds.has(id)) delete remoteCursors[id]
  }
}

function scheduleReconnect() {
  if (reconnectTimer) return
  reconnectAttempts++
  const delay = Math.min(RECONNECT_BASE_DELAY * Math.pow(2, reconnectAttempts - 1), RECONNECT_MAX_DELAY)
  setStatus("disconnected", "Disconnected. Reconnecting in " + Math.round(delay / 1000) + "s...")
  reconnectTimer = setTimeout(() => { reconnectTimer = null; connect() }, delay)
}

// --- Editor input handling ---

editor.addEventListener("beforeinput", (e) => {
  if (!applying) {
    lastSelStart = editor.selectionStart
    lastSelEnd = editor.selectionEnd
    lastInputType = e.inputType || ""
  }
})

function applyOp(op) {
  applying = true
  const textArr = serverText.split("")
  let cursorOffset = 0

  if (op.type === "insert") {
    textArr.splice(op.offset, 0, op.value)
    if (op.offset <= lastSelStart) cursorOffset = 1
  } else if (op.type === "delete") {
    if (op.offset < textArr.length) {
      textArr.splice(op.offset, 1)
      if (op.offset < lastSelStart) cursorOffset = -1
    }
  }

  serverText = textArr.join("")
  editor.value = serverText
  editor.selectionStart = Math.max(0, lastSelStart + cursorOffset)
  editor.selectionEnd = Math.max(0, lastSelEnd + cursorOffset)
  lastSelStart = editor.selectionStart
  lastSelEnd = editor.selectionEnd
  applying = false
  updateLocation()
}

editor.addEventListener("input", e => {
  if (applying) return

  const text = editor.value
  const selStart = lastSelStart
  const selEnd = lastSelEnd
  const cursorPos = editor.selectionStart

  if (selEnd > selStart) {
    for (let i = selStart; i < selEnd; i++) {
      sendOp({ type: "delete", offset: selStart, char: serverText[selStart], clientId })
    }
  }

  const oldLen = serverText.length - (selEnd - selStart)
  const newLen = text.length
  const inserted = newLen - oldLen

  if (inserted > 0) {
    const insertedText = text.slice(selStart, selStart + inserted)
    for (let i = 0; i < insertedText.length; i++) {
      sendOp({ type: "insert", value: insertedText[i], offset: selStart + i, clientId })
    }
  } else if (inserted < 0) {
    const deleteCount = -inserted
    for (let i = 0; i < deleteCount; i++) {
      let offset
      if (lastInputType === "deleteContentForward") {
        offset = cursorPos
      } else {
        offset = cursorPos < selStart ? cursorPos : selStart - 1
      }
      sendOp({ type: "delete", offset: Math.max(0, offset), char: serverText[Math.max(0, offset)], clientId })
    }
  }

  applying = true
  editor.value = serverText
  editor.selectionStart = selStart
  editor.selectionEnd = selStart
  lastSelStart = selStart
  lastSelEnd = selStart
  applying = false
})

connect()
</script>

</body>
</html>
