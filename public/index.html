<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CRDT Editor</title>
<style>
html, body { height:100%; margin:0; }
body { font-family:sans-serif; padding:20px 40px; box-sizing:border-box; display:flex; flex-direction:column; }

#toolbar { display:flex; align-items:center; gap:12px; margin-bottom:8px; flex-wrap:wrap; }
#status { padding:4px 10px; border-radius:4px; display:inline-block; font-size:13px; }
#status.connected { background:#d4edda; color:#155724; }
#status.disconnected { background:#f8d7da; color:#721c24; }
#status.connecting { background:#fff3cd; color:#856404; }

#format-bar {
  display:flex; align-items:center; gap:4px;
  border:1px solid #ddd; border-radius:6px; padding:2px 4px;
  background:#fafafa;
}
.fmt-btn {
  border:1px solid transparent; background:none; cursor:pointer;
  padding:4px 8px; border-radius:4px; font-size:14px;
  min-width:28px; text-align:center; color:#333;
  transition: background .1s, border-color .1s;
}
.fmt-btn:hover { background:#e8e8e8; }
.fmt-btn.active { background:#d0e0ff; border-color:#80b0ff; }
.fmt-btn-bold { font-weight:bold; }
.fmt-btn-italic { font-style:italic; }
.fmt-sep { width:1px; height:20px; background:#ddd; margin:0 2px; }

#users-bar { font-size:13px; color:#555; position:relative; display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
#users-bar .label { font-weight:600; color:#333; margin-right:2px; }
.user-badge {
  display:inline-block; padding:2px 9px; border-radius:10px;
  color:#fff; font-size:12px; font-weight:500; cursor:pointer;
  white-space:nowrap; transition:opacity .15s; line-height:1.5;
}
.user-badge:hover { opacity:.8; }
.user-badge.you { box-shadow:inset 0 0 0 2px rgba(255,255,255,.5); }

#users-overflow { color:#0366d6; cursor:pointer; text-decoration:underline dotted; position:relative; font-size:12px; }
#users-popup {
  display:none; position:absolute; top:100%; left:0; margin-top:4px;
  background:#fff; border:1px solid #ddd; border-radius:6px;
  box-shadow:0 4px 12px rgba(0,0,0,.12); padding:6px 0;
  z-index:20; min-width:140px; max-height:240px; overflow-y:auto;
}
#users-popup.visible { display:block; }
#users-popup .popup-item { padding:3px 10px; cursor:pointer; }
#users-popup .popup-item:hover { background:#f5f5f5; }

#editor-container { position:relative; width:100%; flex:1; min-height:200px; }

#editor {
  width:100%; height:100%; font-family:monospace; font-size:16px; line-height:1.4;
  padding:4px; border:1px solid #ccc; background:#fff;
  position:relative; z-index:1;
  box-sizing:border-box; margin:0;
  white-space:pre-wrap; word-wrap:break-word; overflow-wrap:break-word;
  overflow-y:auto; outline:none;
}
#editor:focus { border-color:#80b0ff; }

.remote-cursor {
  position:absolute; width:2px; pointer-events:none; z-index:5;
}
.remote-cursor .cursor-label {
  position:absolute; top:-18px; left:-1px; font-size:10px;
  color:#fff; padding:1px 4px; border-radius:3px 3px 3px 0;
  white-space:nowrap; pointer-events:none; line-height:1.4;
}
.remote-selection {
  position:absolute; pointer-events:none; z-index:4; opacity:0.25;
}
#cursor-overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:5; overflow:hidden;
}

.bullet-line {
  display:block; padding-left:24px; position:relative;
}
.bullet-line::before {
  content:'\2022'; position:absolute; left:8px; color:#555;
}

#location-bar {
  text-align:right; font-size:12px; color:#888;
  margin-top:4px; font-family:monospace;
}

#doc-bar {
  display:flex; align-items:center; gap:8px; margin-bottom:10px;
  font-size:13px; flex-wrap:wrap;
}
#doc-bar .label { font-weight:600; color:#333; }
#doc-list { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
.doc-link {
  display:inline-block; padding:2px 10px; border-radius:4px;
  text-decoration:none; color:#0366d6; font-size:12px;
  border:1px solid #ddd; background:#fafafa; cursor:pointer;
  transition: background .1s, border-color .1s;
}
.doc-link:hover { background:#e8f0fe; border-color:#80b0ff; }
.doc-link.active { background:#d0e0ff; border-color:#80b0ff; font-weight:600; }
.doc-link .doc-users { font-size:10px; color:#888; margin-left:4px; }
#new-doc-input {
  border:1px solid #ddd; border-radius:4px; padding:2px 6px;
  font-size:12px; width:100px; outline:none;
}
#new-doc-input:focus { border-color:#80b0ff; }
#new-doc-btn {
  border:1px solid #ddd; border-radius:4px; padding:2px 8px;
  font-size:12px; cursor:pointer; background:#fafafa;
}
#new-doc-btn:hover { background:#e8e8e8; }
</style>
</head>
<body>

<h2>CRDT Collaborative Editor</h2>
<div id="doc-bar">
  <span class="label">Documents:</span>
  <span id="doc-list"></span>
  <input id="new-doc-input" placeholder="new doc name" />
  <button id="new-doc-btn">+ New</button>
</div>
<div id="toolbar">
  <div id="status" class="connecting">Connecting...</div>
  <div id="format-bar">
    <button class="fmt-btn fmt-btn-bold" data-fmt="bold" title="Bold (Ctrl+B)">B</button>
    <button class="fmt-btn fmt-btn-italic" data-fmt="italic" title="Italic (Ctrl+I)">I</button>
    <div class="fmt-sep"></div>
    <button class="fmt-btn" data-fmt="bullet" title="Bullet List">&#8226;</button>
  </div>
  <div id="users-bar"><span class="label">Users:</span> <span id="users-list"></span></div>
</div>
<div id="editor-container">
  <div id="editor" contenteditable="true" spellcheck="false"></div>
  <div id="cursor-overlay"></div>
</div>
<div id="location-bar">Location: <span id="location">Ln 1, Col 1</span></div>

<script>
const editor = document.getElementById("editor")
const statusEl = document.getElementById("status")
const usersListEl = document.getElementById("users-list")
const locationEl = document.getElementById("location")
const params = new URLSearchParams(location.search)
const docId = params.get("doc") || "main"
const clientId = Math.random().toString(36).substring(7)

let ws = null
let serverText = ""        // plain text mirror
let formattedChars = []    // [{value, attrs:{bold,italic,...}}]
let applying = false
let lastSelStart = 0
let lastSelEnd = 0
let lastInputType = ""

let myUserId = null
let myColor = null
let currentUsers = []
let remoteCursors = {}
const INLINE_MAX = 3

// --- Selection color ---

let selectionStyleEl = null

function applySelectionColor(color) {
  if (!selectionStyleEl) {
    selectionStyleEl = document.createElement('style')
    document.head.appendChild(selectionStyleEl)
  }
  // Convert hex to rgba for 35% opacity selection highlight
  const r = parseInt(color.slice(1,3), 16)
  const g = parseInt(color.slice(3,5), 16)
  const b = parseInt(color.slice(5,7), 16)
  selectionStyleEl.textContent =
    `#editor::selection, #editor *::selection { background: rgba(${r},${g},${b},0.35); color: inherit; }`
}

// Reconnection state
let reconnectAttempts = 0
const RECONNECT_BASE_DELAY = 1000
const RECONNECT_MAX_DELAY = 30000
let reconnectTimer = null

// --- Helpers ---

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
}

function setStatus(state, text) {
  statusEl.className = state
  statusEl.textContent = text
}

function sendOp(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data))
  }
}

// --- Cursor offset <-> DOM position ---
// These functions convert between flat character offsets (used by the CRDT)
// and DOM positions (node + offset within node) used by the Selection API.
// They must account for text nodes, <br> elements (= newlines), and
// element containers (spans, bullet divs).

function domOffsetToFlat(targetNode, targetOffset) {
  // All lines are wrapped in <div> elements (direct children of editor).
  // Each div after the first represents a \n preceding that line's content.
  // Inside divs: text nodes hold chars, <br> is empty-line placeholder (0 chars).
  let count = 0
  let found = false

  // Build index map for O(1) child-index lookups
  const divIndex = new Map()
  for (let i = 0; i < editor.childNodes.length; i++) {
    divIndex.set(editor.childNodes[i], i)
  }

  function walk(node) {
    if (found) return

    if (node === targetNode) {
      if (node.nodeType === Node.TEXT_NODE) {
        count += targetOffset
      } else {
        // If target is a line div (after the first), count the implicit newline
        if (node.nodeName === 'DIV' && node.parentNode === editor) {
          const idx = divIndex.get(node)
          if (idx > 0) count += 1
        }
        // Count children up to targetOffset
        for (let i = 0; i < targetOffset && i < node.childNodes.length; i++) {
          countAll(node.childNodes[i])
        }
      }
      found = true
      return
    }

    if (node.nodeType === Node.TEXT_NODE) {
      count += node.textContent.length
    } else if (node.nodeName === 'BR') {
      // BR inside a div is just an empty-line placeholder, counts as 0
    } else {
      // For div children of editor (after the first), count a newline
      if (node.nodeName === 'DIV' && node.parentNode === editor) {
        const idx = divIndex.get(node)
        if (idx > 0) count += 1  // newline before this line
      }
      for (let i = 0; i < node.childNodes.length; i++) {
        if (found) return
        walk(node.childNodes[i])
      }
    }
  }

  function countAll(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      count += node.textContent.length
    } else if (node.nodeName === 'BR') {
      // empty-line placeholder, 0 chars
    } else {
      if (node.nodeName === 'DIV' && node.parentNode === editor) {
        const idx = divIndex.get(node)
        if (idx > 0) count += 1
      }
      for (let i = 0; i < node.childNodes.length; i++) {
        countAll(node.childNodes[i])
      }
    }
  }

  walk(editor)
  return count
}

function flatToDomOffset(flatOffset) {
  // All lines are in <div> children of editor.
  // Each div after the first consumes 1 for the implicit newline.
  // Inside divs: text nodes hold chars, <br> is empty-line placeholder (0 chars).
  let remaining = flatOffset
  const divs = editor.childNodes

  for (let d = 0; d < divs.length; d++) {
    const div = divs[d]
    // Newline before this line (for divs after the first)
    if (d > 0) {
      if (remaining === 0) {
        // Position at the end of the previous div (after its content = after the \n)
        return { node: editor, offset: d }
      }
      remaining -= 1  // consume the implicit newline
    }

    // Walk inside this div to find the position
    const result = walkInDiv(div, remaining)
    if (result.found) return result.pos
    remaining = result.remaining
  }

  // Past end
  return { node: editor, offset: editor.childNodes.length }
}

function walkInDiv(container, remaining) {
  for (let i = 0; i < container.childNodes.length; i++) {
    const node = container.childNodes[i]
    if (node.nodeType === Node.TEXT_NODE) {
      if (remaining <= node.textContent.length) {
        return { found: true, pos: { node: node, offset: remaining } }
      }
      remaining -= node.textContent.length
    } else if (node.nodeName === 'BR') {
      // Empty-line placeholder — if remaining is 0, position before the BR
      if (remaining === 0) {
        return { found: true, pos: { node: container, offset: i } }
      }
      // BR inside a div is a placeholder, no chars to consume
    } else {
      // Nested element (span, etc.) — recurse
      const result = walkInDiv(node, remaining)
      if (result.found) return result
      remaining = result.remaining
    }
  }
  return { found: false, remaining }
}

function getSelectionOffsets() {
  const sel = window.getSelection()
  if (!sel.rangeCount) return { start: 0, end: 0 }
  const range = sel.getRangeAt(0)
  const start = domOffsetToFlat(range.startContainer, range.startOffset)
  const end = domOffsetToFlat(range.endContainer, range.endOffset)
  return { start, end }
}

function setSelectionOffsets(start, end) {
  const sel = window.getSelection()
  const startPos = flatToDomOffset(start)
  const endPos = flatToDomOffset(end)
  if (startPos && endPos) {
    const range = document.createRange()
    range.setStart(startPos.node, startPos.offset)
    range.setEnd(endPos.node, endPos.offset)
    sel.removeAllRanges()
    sel.addRange(range)
  }
}

// --- Rendering ---
// Builds the editor innerHTML from formattedChars.
// Only called on init and when a REMOTE operation arrives.
// Local edits use optimistic updates and do NOT re-render
// (the DOM already shows what the user typed).

function renderEditor() {
  // Split into lines; a newline with block:"bullet" makes the NEXT line a bullet.
  // ALL lines are wrapped in <div> elements for consistent offset mapping.
  // Newlines are implicit from div boundaries (no <br> between lines).
  const lines = []
  let currentLine = { chars: [], isBullet: false }

  for (let i = 0; i < formattedChars.length; i++) {
    const ch = formattedChars[i]
    if (ch.value === '\n') {
      lines.push(currentLine)
      const isBullet = ch.attrs && ch.attrs.block === 'bullet'
      currentLine = { chars: [], isBullet }
    } else {
      currentLine.chars.push(ch)
    }
  }
  lines.push(currentLine)

  let html = ''
  for (let lineIdx = 0; lineIdx < lines.length; lineIdx++) {
    const line = lines[lineIdx]
    let lineHtml = ''

    let i = 0
    while (i < line.chars.length) {
      const ch = line.chars[i]
      const ak = inlineAttrKey(ch.attrs)
      let run = ''
      while (i < line.chars.length && inlineAttrKey(line.chars[i].attrs) === ak) {
        run += escapeHtml(line.chars[i].value)
        i++
      }
      lineHtml += wrapRun(run, ch.attrs)
    }

    const cls = line.isBullet ? ' class="bullet-line"' : ''
    html += '<div' + cls + '>' + (lineHtml || '<br>') + '</div>'
  }

  if (formattedChars.length === 0) {
    html = '<div><br></div>'
  }

  editor.innerHTML = html
}

function wrapRun(text, attrs) {
  let style = ''
  if (attrs && attrs.bold) style += 'font-weight:bold;'
  if (attrs && attrs.italic) style += 'font-style:italic;'
  if (style) {
    return '<span style="' + style + '">' + text + '</span>'
  }
  return '<span>' + text + '</span>'
}

function inlineAttrKey(attrs) {
  if (!attrs) return ''
  const parts = []
  if (attrs.bold) parts.push('b')
  if (attrs.italic) parts.push('i')
  return parts.join(',')
}

// --- User presence rendering ---

function renderUsers() {
  usersListEl.innerHTML = ""
  if (currentUsers.length === 0) return

  const sorted = currentUsers.slice().sort((a, b) => {
    if (a.id === myUserId) return -1
    if (b.id === myUserId) return 1
    return 0
  })

  const makeBadge = (u) => {
    const isYou = u.id === myUserId
    const label = isYou ? u.id + " (you)" : u.id
    const youClass = isYou ? " you" : ""
    return '<span class="user-badge' + youClass + '" style="background:' + u.color +
      '" data-userid="' + u.id + '" title="Click to jump to cursor">' + label + '</span>'
  }

  if (sorted.length <= INLINE_MAX) {
    usersListEl.innerHTML = sorted.map(makeBadge).join(" ")
  } else {
    const shown = sorted.slice(0, 2)
    const rest = sorted.slice(2)
    const popupItems = sorted.map(u =>
      '<div class="popup-item">' + makeBadge(u) + '</div>'
    ).join("")

    usersListEl.innerHTML = shown.map(makeBadge).join(" ") +
      ' <span id="users-overflow">+' + rest.length + ' more' +
      '<div id="users-popup">' + popupItems + '</div></span>'

    const overflow = document.getElementById("users-overflow")
    const popup = document.getElementById("users-popup")
    overflow.addEventListener("mouseenter", () => popup.classList.add("visible"))
    overflow.addEventListener("mouseleave", () => popup.classList.remove("visible"))
  }
}

usersListEl.addEventListener("click", (e) => {
  const badge = e.target.closest(".user-badge")
  if (!badge) return
  const userId = badge.dataset.userid
  if (!userId || userId === myUserId) return
  const cursor = remoteCursors[userId]
  if (!cursor) return
  // Scroll the remote cursor into view without hijacking the local selection
  const pos = flatToDomOffset(cursor.offset)
  if (pos && pos.node) {
    const target = pos.node.nodeType === Node.TEXT_NODE ? pos.node.parentNode : pos.node
    target.scrollIntoView({ block: 'center', behavior: 'smooth' })
  }
})

// --- Remote cursor overlays ---

const cursorOverlay = document.getElementById("cursor-overlay")

function renderRemoteCursors() {
  cursorOverlay.innerHTML = ''
  const editorRect = editor.getBoundingClientRect()

  for (const [userId, cursor] of Object.entries(remoteCursors)) {
    if (userId === myUserId) continue
    const color = cursor.color || '#888'
    const hasSelection = cursor.selEnd !== undefined && cursor.selEnd !== cursor.offset

    if (hasSelection) {
      // Draw selection highlight rectangles
      const start = Math.min(cursor.offset, cursor.selEnd)
      const end = Math.max(cursor.offset, cursor.selEnd)
      const startPos = flatToDomOffset(start)
      const endPos = flatToDomOffset(end)
      if (startPos && endPos) {
        try {
          const range = document.createRange()
          range.setStart(startPos.node, startPos.offset)
          range.setEnd(endPos.node, endPos.offset)
          const rects = range.getClientRects()
          for (const rect of rects) {
            const div = document.createElement('div')
            div.className = 'remote-selection'
            div.style.background = color
            div.style.top = (rect.top - editorRect.top ) + 'px'
            div.style.left = (rect.left - editorRect.left) + 'px'
            div.style.width = rect.width + 'px'
            div.style.height = rect.height + 'px'
            cursorOverlay.appendChild(div)
          }
        } catch(e) { /* ignore range errors */ }
      }
    }

    // Draw cursor caret at the cursor.offset position
    const caretPos = flatToDomOffset(cursor.offset)
    if (caretPos) {
      try {
        const range = document.createRange()
        range.setStart(caretPos.node, caretPos.offset)
        range.collapse(true)
        const rect = range.getClientRects()[0] || range.getBoundingClientRect()
        if (rect && rect.height > 0) {
          const caret = document.createElement('div')
          caret.className = 'remote-cursor'
          caret.style.background = color
          caret.style.top = (rect.top - editorRect.top ) + 'px'
          caret.style.left = (rect.left - editorRect.left) + 'px'
          caret.style.height = rect.height + 'px'

          const label = document.createElement('span')
          label.className = 'cursor-label'
          label.style.background = color
          label.textContent = userId
          caret.appendChild(label)

          cursorOverlay.appendChild(caret)
        }
      } catch(e) { /* ignore range errors */ }
    }
  }
}

// --- Location bar ---

function updateLocation() {
  const sel = getSelectionOffsets()
  const offset = Math.min(sel.start, serverText.length)
  const before = serverText.slice(0, offset)
  const lines = before.split('\n')
  const line = lines.length
  const col = lines[lines.length - 1].length + 1
  const selLen = Math.abs(sel.end - sel.start)
  locationEl.textContent = 'Ln ' + line + ', Col ' + col +
    (selLen > 0 ? ' (' + selLen + ' selected)' : '')
}

// --- Cursor broadcasting (debounced) ---

let cursorTimer = null
function sendCursorUpdate() {
  clearTimeout(cursorTimer)
  cursorTimer = setTimeout(() => {
    const sel = getSelectionOffsets()
    sendOp({
      type: "cursor",
      offset: sel.start,
      selEnd: sel.end,
      clientId
    })
  }, 50)
}

document.addEventListener('selectionchange', () => {
  if (document.activeElement !== editor) return
  updateLocation()
  updateFormatButtonState()
  sendCursorUpdate()
})

editor.addEventListener('scroll', renderRemoteCursors)

// --- Blur selection overlay ---
// When the editor loses focus, show the local selection in the user's color
// so it doesn't gray out or disappear.

function showBlurSelection() {
  clearBlurSelection()
  if (!myColor) return
  const sel = window.getSelection()
  if (!sel.rangeCount || sel.isCollapsed) return
  const range = sel.getRangeAt(0)
  if (!editor.contains(range.startContainer)) return
  const editorRect = editor.getBoundingClientRect()
  const rects = range.getClientRects()
  for (const rect of rects) {
    const div = document.createElement('div')
    div.className = 'blur-selection'
    div.style.cssText = `position:absolute;pointer-events:none;z-index:4;` +
      `background:${myColor};opacity:0.25;` +
      `top:${rect.top - editorRect.top }px;` +
      `left:${rect.left - editorRect.left}px;` +
      `width:${rect.width}px;height:${rect.height}px;`
    cursorOverlay.appendChild(div)
  }
}

function clearBlurSelection() {
  cursorOverlay.querySelectorAll('.blur-selection').forEach(el => el.remove())
}

editor.addEventListener('blur', showBlurSelection)
editor.addEventListener('focus', clearBlurSelection)

// --- Format button state ---

function updateFormatButtonState() {
  const sel = getSelectionOffsets()
  if (sel.start >= formattedChars.length) {
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'))
    return
  }

  const start = Math.min(sel.start, sel.end)
  const end = Math.max(sel.start, sel.end)
  const checkStart = start
  const checkEnd = end > start ? end : start + 1

  for (const fmt of ['bold', 'italic']) {
    const btn = document.querySelector('[data-fmt="' + fmt + '"]')
    if (!btn) continue
    let allHave = true
    for (let i = checkStart; i < checkEnd && i < formattedChars.length; i++) {
      if (!formattedChars[i].attrs || !formattedChars[i].attrs[fmt]) {
        allHave = false
        break
      }
    }
    btn.classList.toggle('active', allHave && checkStart < formattedChars.length)
  }

  const bulletBtn = document.querySelector('[data-fmt="bullet"]')
  if (bulletBtn) {
    let isBullet = false
    const pos = Math.min(sel.start, sel.end)
    for (let i = pos - 1; i >= 0; i--) {
      if (formattedChars[i] && formattedChars[i].value === '\n') {
        isBullet = !!(formattedChars[i].attrs && formattedChars[i].attrs.block === 'bullet')
        break
      }
    }
    bulletBtn.classList.toggle('active', isBullet)
  }
}

// --- Format bar click handling ---

document.getElementById("format-bar").addEventListener("click", (e) => {
  const btn = e.target.closest(".fmt-btn")
  if (!btn) return
  const fmt = btn.dataset.fmt
  if (!fmt) return

  const sel = getSelectionOffsets()
  const start = Math.min(sel.start, sel.end)
  const end = Math.max(sel.start, sel.end)

  if (fmt === 'bullet') {
    let nlOffset = -1
    for (let i = start - 1; i >= 0; i--) {
      if (formattedChars[i] && formattedChars[i].value === '\n') {
        nlOffset = i
        break
      }
    }
    if (nlOffset === -1) return

    const isCurrentlyBullet = !!(formattedChars[nlOffset].attrs && formattedChars[nlOffset].attrs.block === 'bullet')
    const newAttrs = { block: isCurrentlyBullet ? false : 'bullet' }

    sendOp({ type: "format", offset: nlOffset, endOffset: nlOffset + 1, attrs: newAttrs, clientId })

    // Optimistic update
    if (!formattedChars[nlOffset].attrs) formattedChars[nlOffset].attrs = {}
    if (isCurrentlyBullet) {
      delete formattedChars[nlOffset].attrs.block
    } else {
      formattedChars[nlOffset].attrs.block = 'bullet'
    }
    renderEditor()
    editor.focus()
    setSelectionOffsets(start, end)
    return
  }

  // Bold / italic: need a selection
  if (start === end) return

  let allHave = true
  for (let i = start; i < end && i < formattedChars.length; i++) {
    if (!formattedChars[i].attrs || !formattedChars[i].attrs[fmt]) {
      allHave = false
      break
    }
  }

  const attrs = {}
  attrs[fmt] = !allHave

  sendOp({ type: "format", offset: start, endOffset: end, attrs, clientId })

  // Optimistic update
  for (let i = start; i < end && i < formattedChars.length; i++) {
    if (!formattedChars[i].attrs) formattedChars[i].attrs = {}
    if (attrs[fmt]) {
      formattedChars[i].attrs[fmt] = true
    } else {
      delete formattedChars[i].attrs[fmt]
    }
  }
  renderEditor()
  editor.focus()
  setSelectionOffsets(start, end)
  updateFormatButtonState()
})

// --- Keyboard shortcuts ---

editor.addEventListener("keydown", (e) => {
  // Handle Enter ourselves to avoid browser contenteditable quirks.
  // Browsers create <div> wrappers on the first Enter which getEditorText()
  // wouldn't count as a newline, causing the op to be silently lost.
  if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault()
    const sel = getSelectionOffsets()
    const start = Math.min(sel.start, sel.end)
    const end = Math.max(sel.start, sel.end)

    // Delete selection if any
    if (end > start) {
      for (let i = start; i < end; i++) {
        sendOp({ type: "delete", offset: start, clientId })
      }
      formattedChars.splice(start, end - start)
      serverText = serverText.slice(0, start) + serverText.slice(end)
    }

    // Insert newline
    sendOp({ type: "insert", value: "\n", offset: start, clientId })
    formattedChars.splice(start, 0, { value: "\n", attrs: {} })
    serverText = serverText.slice(0, start) + "\n" + serverText.slice(start)

    // Re-render and place cursor after the newline
    renderEditor()
    editor.focus()
    setSelectionOffsets(start + 1, start + 1)
    lastSelStart = start + 1
    lastSelEnd = start + 1
    return
  }

  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey) {
    if (e.key === 'b' || e.key === 'B') {
      e.preventDefault()
      document.querySelector('[data-fmt="bold"]').click()
    } else if (e.key === 'i' || e.key === 'I') {
      e.preventDefault()
      document.querySelector('[data-fmt="italic"]').click()
    }
  }
})

// --- Connection ---

function connect() {
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return
  setStatus("connecting", reconnectAttempts > 0
    ? "Reconnecting (attempt " + reconnectAttempts + ")..." : "Connecting...")

  ws = new WebSocket("ws://" + location.host + "?doc=" + docId)

  ws.onopen = () => {
    reconnectAttempts = 0
    setStatus("connected", "Connected")
  }

  ws.onmessage = e => {
    const msg = JSON.parse(e.data)

    if (msg.type === "init") {
      serverText = msg.text
      if (msg.formattedChars && msg.formattedChars.length > 0) {
        formattedChars = msg.formattedChars
      } else {
        formattedChars = Array.from(serverText).map(ch => ({ value: ch, attrs: {} }))
      }
      if (msg.userId) myUserId = msg.userId
      if (msg.color) {
        myColor = msg.color
        applySelectionColor(myColor)
      }
      if (msg.users) {
        currentUsers = msg.users
        syncRemoteCursors()
        renderUsers()
      }
      renderEditor()
      renderRemoteCursors()
      updateLocation()
    }

    if (msg.type === "users") {
      currentUsers = msg.users
      syncRemoteCursors()
      renderUsers()
      renderRemoteCursors()
    }

    if (msg.type === "cursor") {
      remoteCursors[msg.userId] = {
        offset: msg.offset,
        selEnd: msg.selEnd,
        color: msg.color
      }
      renderRemoteCursors()
    }

    if (msg.type === "op") {
      applyRemoteOp(msg.op)
    }
  }

  ws.onclose = () => {
    setStatus("disconnected", "Disconnected")
    scheduleReconnect()
  }
  ws.onerror = () => {}
}

function syncRemoteCursors() {
  const activeIds = new Set()
  for (const u of currentUsers) {
    activeIds.add(u.id)
    if (u.id !== myUserId && u.cursor) {
      remoteCursors[u.id] = { offset: u.cursor.offset, selEnd: u.cursor.selEnd, color: u.color }
    }
  }
  for (const id of Object.keys(remoteCursors)) {
    if (!activeIds.has(id)) delete remoteCursors[id]
  }
}

function scheduleReconnect() {
  if (reconnectTimer) return
  reconnectAttempts++
  const delay = Math.min(RECONNECT_BASE_DELAY * Math.pow(2, reconnectAttempts - 1), RECONNECT_MAX_DELAY)
  setStatus("disconnected", "Disconnected. Reconnecting in " + Math.round(delay / 1000) + "s...")
  reconnectTimer = setTimeout(() => { reconnectTimer = null; connect() }, delay)
}

// --- Remote operations ---
// These arrive via broadcast from the server.
// We SKIP ops that originated from us (same clientId) because we already
// applied them optimistically in the input handler.

// Pending cursor adjustment from batched remote ops
let pendingCursorShift = 0
let renderScheduled = false

function scheduleRender() {
  if (renderScheduled) return
  renderScheduled = true
  requestAnimationFrame(() => {
    renderScheduled = false
    applying = true
    const savedSel = getSelectionOffsets()
    renderEditor()
    if (document.activeElement === editor) {
      setSelectionOffsets(
        Math.max(0, savedSel.start + pendingCursorShift),
        Math.max(0, savedSel.end + pendingCursorShift)
      )
    }
    applying = false
    pendingCursorShift = 0
    renderRemoteCursors()
    updateLocation()
  })
}

function applyRemoteOp(op) {
  // Skip our own echoed operations — already applied optimistically
  if (op.clientId === clientId) return

  if (op.type === "insert") {
    const chars = Array.from(op.value)
    const arr = Array.from(serverText)
    arr.splice(op.offset, 0, ...chars)
    serverText = arr.join("")

    const attrs = op.attrs ? { ...op.attrs } : {}
    const newChars = chars.map(ch => ({ value: ch, attrs: { ...attrs } }))
    formattedChars.splice(op.offset, 0, ...newChars)

    const savedSel = getSelectionOffsets()
    if (op.offset <= savedSel.start) pendingCursorShift += chars.length
  } else if (op.type === "delete") {
    if (op.offset < serverText.length) {
      const arr = Array.from(serverText)
      arr.splice(op.offset, 1)
      serverText = arr.join("")
      formattedChars.splice(op.offset, 1)

      const savedSel = getSelectionOffsets()
      if (op.offset < savedSel.start) pendingCursorShift -= 1
    }
  } else if (op.type === "format") {
    const start = op.offset
    const end = op.endOffset !== undefined ? op.endOffset : start + 1
    for (let i = start; i < end && i < formattedChars.length; i++) {
      if (!formattedChars[i].attrs) formattedChars[i].attrs = {}
      for (const [key, value] of Object.entries(op.attrs)) {
        if (value === false || value === null) {
          delete formattedChars[i].attrs[key]
        } else {
          formattedChars[i].attrs[key] = value
        }
      }
    }
  }

  scheduleRender()
}

// --- Editor input handling ---
// Uses optimistic updates: local edits update serverText/formattedChars
// immediately and leave the DOM as-is (user already sees their edit).
// When the server echoes our ops back, we skip them (see applyRemoteOp).

// Get plain text from contenteditable DOM
// Block-level tag names that browsers may create inside contenteditable
const BLOCK_TAGS = new Set(['DIV', 'P', 'BLOCKQUOTE', 'LI', 'UL', 'OL', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6'])

function getEditorText() {
  // All lines are in <div> children of editor.
  // Each div after the first contributes a \n before its content.
  // <br> inside divs is just an empty-line placeholder (no text).
  let text = ''
  let blockCount = 0
  for (const child of editor.childNodes) {
    if (child.nodeType === Node.TEXT_NODE) {
      // Browser quirk: text directly in editor (not in a div)
      text += child.textContent
    } else if (child.nodeName === 'BR') {
      text += '\n'
    } else if (child.nodeType === Node.ELEMENT_NODE) {
      if (blockCount > 0) text += '\n'
      text += getTextFromNode(child)
      blockCount++
    }
  }
  return text
}

function getTextFromNode(node) {
  let text = ''
  for (const child of node.childNodes) {
    if (child.nodeType === Node.TEXT_NODE) {
      text += child.textContent
    } else if (child.nodeName === 'BR') {
      // Empty-line placeholder inside a div, no text
    } else if (child.nodeType === Node.ELEMENT_NODE) {
      text += getTextFromNode(child)
    }
  }
  return text
}

editor.addEventListener("beforeinput", (e) => {
  if (applying) return
  const sel = getSelectionOffsets()
  lastSelStart = sel.start
  lastSelEnd = sel.end
  lastInputType = e.inputType || ""

  // Paste: strip formatting, insert as plain text
  if (e.inputType === 'insertFromPaste') {
    e.preventDefault()
    const dt = e.dataTransfer || e.clipboardData || window.clipboardData
    if (!dt) return
    const text = dt.getData('text/plain')
    if (!text) return

    // Delete selection
    if (lastSelEnd > lastSelStart) {
      for (let i = lastSelStart; i < lastSelEnd; i++) {
        sendOp({ type: "delete", offset: lastSelStart, clientId })
      }
      formattedChars.splice(lastSelStart, lastSelEnd - lastSelStart)
      serverText = serverText.slice(0, lastSelStart) + serverText.slice(lastSelEnd)
    }

    // Insert pasted text as a single bulk message
    let attrs = {}
    if (lastSelStart > 0 && formattedChars.length > 0) {
      attrs = { ...formattedChars[Math.min(lastSelStart - 1, formattedChars.length - 1)].attrs }
      delete attrs.block
    }
    sendOp({ type: "insert", value: text, offset: lastSelStart, clientId, attrs: Object.keys(attrs).length > 0 ? attrs : undefined })
    const newChars = Array.from(text).map(ch => ({ value: ch, attrs: { ...attrs } }))
    formattedChars.splice(lastSelStart, 0, ...newChars)
    serverText = serverText.slice(0, lastSelStart) + text + serverText.slice(lastSelStart)

    // Re-render and place cursor after pasted text
    renderEditor()
    editor.focus()
    const newCursor = lastSelStart + text.length
    setSelectionOffsets(newCursor, newCursor)
    return
  }
})

editor.addEventListener("input", e => {
  if (applying) return

  const newText = getEditorText()
  const selStart = lastSelStart
  const selEnd = lastSelEnd

  // 1) Delete the old selection (if any)
  if (selEnd > selStart) {
    for (let i = selStart; i < selEnd; i++) {
      sendOp({ type: "delete", offset: selStart, clientId })
    }
    // Optimistic: remove from our model
    formattedChars.splice(selStart, selEnd - selStart)
    serverText = serverText.slice(0, selStart) + serverText.slice(selEnd)
  }

  // 2) Figure out what was inserted or deleted
  const oldLen = serverText.length
  const newLen = newText.length
  const delta = newLen - oldLen

  if (delta > 0) {
    // Characters were inserted at selStart
    const insertedText = newText.slice(selStart, selStart + delta)
    for (let i = 0; i < insertedText.length; i++) {
      // Inherit attrs from the character before the insertion point
      let attrs = {}
      const inheritIdx = selStart + i - 1
      if (inheritIdx >= 0 && inheritIdx < formattedChars.length) {
        attrs = { ...formattedChars[inheritIdx].attrs }
        // Don't inherit block attrs
        delete attrs.block
      }
      sendOp({ type: "insert", value: insertedText[i], offset: selStart + i, clientId, attrs: Object.keys(attrs).length > 0 ? attrs : undefined })
      formattedChars.splice(selStart + i, 0, { value: insertedText[i], attrs })
    }
    serverText = serverText.slice(0, selStart) + insertedText + serverText.slice(selStart)
  } else if (delta < 0) {
    // Characters were deleted
    const deleteCount = -delta
    const curSel = getSelectionOffsets()
    for (let i = 0; i < deleteCount; i++) {
      let offset
      if (lastInputType === "deleteContentForward") {
        offset = selStart
      } else {
        // Backspace: characters deleted before the old cursor
        offset = selStart - deleteCount
      }
      offset = Math.max(0, offset)
      sendOp({ type: "delete", offset, clientId })
    }
    // Optimistic: remove from our model
    let delOffset
    if (lastInputType === "deleteContentForward") {
      delOffset = selStart
    } else {
      delOffset = Math.max(0, selStart - deleteCount)
    }
    formattedChars.splice(delOffset, deleteCount)
    serverText = serverText.slice(0, delOffset) + serverText.slice(delOffset + deleteCount)
  }

  // Do NOT re-render — the DOM already shows the correct state from the user's edit.
  // Update cursor tracking from the live DOM.
  const curSel = getSelectionOffsets()
  lastSelStart = curSel.start
  lastSelEnd = curSel.end
  updateLocation()
})

// --- Document list ---

const docListEl = document.getElementById("doc-list")
const newDocInput = document.getElementById("new-doc-input")
const newDocBtn = document.getElementById("new-doc-btn")

function fetchDocList() {
  fetch("/api/documents")
    .then(r => r.json())
    .then(docs => renderDocList(docs))
    .catch(() => {})
}

function renderDocList(docs) {
  // Ensure current doc is in the list
  const ids = new Set(docs.map(d => d.id))
  if (!ids.has(docId)) {
    docs.unshift({ id: docId, lastUpdated: Date.now(), activeUsers: 0 })
  }

  docListEl.innerHTML = docs.map(d => {
    const active = d.id === docId ? " active" : ""
    const users = d.activeUsers > 0 ? '<span class="doc-users">(' + d.activeUsers + ')</span>' : ""
    return '<a class="doc-link' + active + '" href="?doc=' + encodeURIComponent(d.id) + '">' +
      escapeHtml(d.id) + users + '</a>'
  }).join("")
}

newDocBtn.addEventListener("click", () => {
  const name = newDocInput.value.trim()
  if (name) window.location.href = "?doc=" + encodeURIComponent(name)
})
newDocInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") newDocBtn.click()
})

connect()
fetchDocList()
// Refresh doc list periodically to show new docs and user counts
setInterval(fetchDocList, 10000)
</script>
